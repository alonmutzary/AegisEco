fetch_and_store_task:
  description: >
    You are responsible for updating the AegisEco database with the latest meteorological data.
    You must perform two distinct steps:
    1. Use the 'Sync Rain Data' tool to fetch the current measurements from IMS and save them directly to the database in one action.
    2. Use the 'Update Database Forecasts' tool to fetch the 6-hour rainfall forecasts.
  expected_output: >
    A short summary confirming the real-time data sync and the forecast updates.
  agent: data_engineer

analyze_risk_task:
  description: >
    Use the 'Query High Rainfall Events' tool to search the database for any 
    recorded measurements where the rainfall exceeded 5.0 mm (in one row). 
    Analyze the historical February data returned by the tool.
  expected_output: >
    A list of flagged stations including the station name, exact date/time, and rainfall amount. 
    If no stations crossed the threshold, output "No anomalies detected."
  agent: flood_analyst

alert_task:
  description: >
    Review the output from the flood_analyst. If there are flagged stations, generate a 
    WARNING message highlighting the locations. If the input says "No anomalies detected", 
    output a calm "All clear" message.
  expected_output: >
    A formatted alert string ready to be printed to the console or sent to Telegram.
  agent: communications_officer

monitor_warnings_task:
  description: >
    Use the 'Fetch IMS Warnings' tool to check for active weather warnings.
    You MUST format the output EXACTLY according to the strict template below. 
    There may be multiple warnings. Treat every warning as a separate item.
    If the tool returns a message of no active warnings (e.g., "No active warnings currently in the IMS feed") return that message directly.
    Extract the warning type directly from the alert text and format it in Title Case (e.g., Flash Floods).

    TEMPLATE:
    # {Date}

    ## {Color} - {Warning Type}
    Regions: {warning regions}
    Timeframe: {warning time and dates}

    EXAMPLE:
    # 07/04/2026

    ## Yellow - Flash Floods
    Regions: Judea Desert, Dead Sea, Northern Arava
    Timeframe: 10:00 to 22:00 LT

    ## Orange - Flash Floods
    Regions: Southern Negev
    Timeframe: 12:00 to 20:00 LT
  expected_output: >
    A strict string block using Markdown headers (# for Date, ## for Color and Type), with each warning structured clearly and separated by an empty line.
  agent: warning_monitor

